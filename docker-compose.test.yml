services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.test
    ports:
      - "5098:5000"
    environment:
      - ADMIN_JWT_SECRET=test-secret-for-admin-auth
      - ADMIN_USERNAME=theadmin
      - ADMIN_PASSWORD=thepassword
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: test-frontend/Dockerfile
    ports:
      - "3098:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5098
    depends_on:
      api:
        condition: service_healthy
